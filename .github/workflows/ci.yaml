name: API Server CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code into the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install Node.js (Using v20 as it's the current LTS)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # This makes future runs much faster

      # 3. Install axios and your test runner
      - name: Install Dependencies
        run: npm install

      # 4. Run your tests
      - name: Run API Tests
        run: npm test